name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-pre:
    name: Deploy to pre (pages-pre)
    runs-on: ubuntu-latest
    concurrency:
      group: pages-pre
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Push to pages-pre
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_PRE_TOKEN }}
          external_repository: lpdfio/pages-pre
          publish_branch: gh-pages
          publish_dir: www/
          cname: pre.lpdf.io
          force_orphan: true

  deploy-prod:
    name: Deploy to prod (GitHub Pages)
    needs: deploy-pre
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: production
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: www/

      - uses: actions/deploy-pages@v4
        id: deployment
